<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONECTA EXPO — Mapa de Reservas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAsHzPVDMVqjYnBsh4vWkhR9WJzKYkEc1Y",
    authDomain: "mapa-olimpo-4daf4.firebaseapp.com",
    databaseURL: "https://mapa-olimpo-4daf4-default-rtdb.firebaseio.com",
    projectId: "mapa-olimpo-4daf4",
    storageBucket: "mapa-olimpo-4daf4.firebasestorage.app",
    messagingSenderId: "956339243979",
    appId: "1:956339243979:web:7171ec398affe68094444e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Expose to global scope
  window._fbSet    = (path, data) => set(ref(db, path), data);
  window._fbRemove = (path)       => remove(ref(db, path));
  window._fbListen = (path, cb)   => onValue(ref(db, path), snap => cb(snap.val()));
</script>

<style>
:root {
  --bg:#080e1a; --sur:#0d1526; --bor:#162040;
  --acc:#3b82f6; --acc2:#60a5fa; --grn:#22c55e; --red:#ef4444;
  --txt:#e2eaf8; --mut:#4a6080;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;background:var(--sur);border-bottom:1px solid var(--bor);flex-shrink:0;gap:12px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;}
.logo em{color:var(--acc);font-style:normal;}
.hstats{display:flex;gap:16px;align-items:center;font-size:0.8rem;}
.hstat{display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--grn);box-shadow:0 0 5px #22c55e99;}
.dr{background:var(--red);}
.hstat b{font-size:0.95rem;font-weight:700;}
.conn-badge{padding:4px 10px;border-radius:20px;font-size:0.68rem;font-weight:700;font-family:'Syne',sans-serif;}
.conn-ok{background:rgba(34,197,94,0.12);color:var(--grn);border:1px solid rgba(34,197,94,0.25);}
.conn-wait{background:rgba(59,130,246,0.12);color:var(--acc);border:1px solid rgba(59,130,246,0.25);}
.conn-err{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25);}

.body{display:flex;flex:1;overflow:hidden;}

.map-wrap{flex:1;overflow:auto;padding:16px;background:#050c18;display:flex;align-items:flex-start;justify-content:center;}
.map-box{position:relative;display:inline-block;line-height:0;}
#map-img{display:block;max-height:calc(100vh - 57px);width:auto;max-width:100%;border-radius:6px;user-select:none;}

.sz{
  position:absolute;border:2px solid transparent;border-radius:3px;
  cursor:pointer;transition:background 0.12s,border-color 0.12s,transform 0.1s,box-shadow 0.12s;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(5px,0.85vw,11px);
  color:rgba(255,255,255,0.93);text-shadow:0 1px 4px rgba(0,0,0,0.95);
  user-select:none;z-index:2;
}
.sz.free{background:rgba(59,130,246,0.18);border-color:rgba(59,130,246,0.55);}
.sz.free:hover{background:rgba(59,130,246,0.35);border-color:var(--acc);transform:scale(1.05);z-index:10;box-shadow:0 0 12px rgba(59,130,246,0.4);}
.sz.occ{background:rgba(239,68,68,0.22);border-color:rgba(239,68,68,0.6);}
.sz.occ:hover{background:rgba(239,68,68,0.38);border-color:var(--red);transform:scale(1.05);z-index:10;}
.sz.sel{background:rgba(59,130,246,0.35)!important;border-color:var(--acc2)!important;box-shadow:0 0 16px rgba(59,130,246,0.55)!important;z-index:15!important;transform:scale(1.06)!important;}

.side{width:310px;min-width:310px;background:var(--sur);border-left:1px solid var(--bor);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--bor);flex-shrink:0;}
.tab{flex:1;padding:12px 4px;text-align:center;cursor:pointer;font-size:0.76rem;font-weight:500;color:var(--mut);border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.on{color:var(--acc2);border-bottom-color:var(--acc);}
.pane{display:none;flex:1;overflow-y:auto;padding:15px;flex-direction:column;gap:11px;}
.pane.on{display:flex;}

.card{background:var(--bg);border:1px solid var(--bor);border-radius:9px;padding:13px;}
.sid{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--acc2);}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:0.7rem;font-weight:600;margin-top:4px;}
.sg{background:rgba(34,197,94,0.12);color:var(--grn);border:1px solid rgba(34,197,94,0.25);}
.sr{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.ssec{font-size:0.73rem;color:var(--mut);margin-top:3px;}

.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:0.67rem;font-weight:500;color:var(--mut);text-transform:uppercase;letter-spacing:0.07em;}
.fg input,.fg textarea{background:var(--bg);border:1px solid var(--bor);border-radius:6px;padding:8px 10px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:0.84rem;outline:none;transition:border-color 0.15s;resize:none;}
.fg input:focus,.fg textarea:focus{border-color:var(--acc);}

.btn{padding:10px 14px;border-radius:7px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.83rem;cursor:pointer;transition:all 0.15s;width:100%;}
.btn-g{background:var(--acc);color:#fff;}
.btn-g:hover{background:var(--acc2);transform:translateY(-1px);}
.btn-r{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-r:hover{background:rgba(239,68,68,0.2);}

.empty{text-align:center;padding:30px 10px;color:var(--mut);}
.empty .ei{font-size:1.6rem;margin-bottom:8px;}
.empty p{font-size:0.8rem;line-height:1.6;}

.occ-card{background:var(--bg);border:1px solid rgba(239,68,68,0.15);border-radius:8px;padding:12px;font-size:0.81rem;line-height:1.8;}
.occ-card strong{color:var(--txt);}
.occ-card .lbl{color:var(--mut);}

.ri{background:var(--bg);border:1px solid var(--bor);border-radius:7px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:border-color 0.15s;}
.ri:hover{border-color:var(--acc);}
.ri-id{font-family:'Syne',sans-serif;font-weight:800;color:var(--acc2);font-size:0.88rem;min-width:42px;}
.ri-info{flex:1;}
.ri-co{font-weight:500;font-size:0.82rem;}
.ri-ct{font-size:0.73rem;color:var(--mut);margin-top:2px;}
.ri-dt{font-size:0.68rem;color:var(--mut);margin-top:3px;}
.ri-del{background:none;border:none;color:var(--mut);cursor:pointer;font-size:0.9rem;padding:2px 4px;transition:color 0.15s;}
.ri-del:hover{color:var(--red);}

.srch{background:var(--bg);border:1px solid var(--bor);border-radius:6px;padding:8px 10px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:0.83rem;outline:none;width:100%;}
.srch:focus{border-color:var(--acc);}

/* Loading overlay */
#loading{position:fixed;inset:0;background:rgba(5,10,20,0.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:38px;height:38px;border:3px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{font-family:'Syne',sans-serif;font-size:0.88rem;color:var(--mut);}

.toast{position:fixed;bottom:16px;right:16px;background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:10px 14px;font-size:0.8rem;z-index:1000;transform:translateY(60px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:260px;}
.toast.on{transform:translateY(0);opacity:1;}
.toast.tg{border-left:3px solid var(--grn);}
.toast.tr{border-left:3px solid var(--red);}
.toast.tb{border-left:3px solid var(--acc);}

::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}
</style>
</head>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>Conectando...</p>
</div>

  <div class="logo">CONECTA <em>EXPO</em></div>

    <span style="color:var(--mut);font-size:0.72rem">/ 55 stands</span>
    <div class="conn-badge conn-wait" id="conn-badge">Conectando</div>
  </div>
</header>

const SNAME = {A:"Módulo Tipo A", B:"Módulo Tipo B", I:"Stand Isla", P:"Stand Premium"};
let RV = {};   // reservations from Firebase
let SEL = null;
let fbReady = false;

// ── WAIT FOR FIREBASE MODULE ──
function waitFB(cb, tries=0) {
  if (window._fbSet && window._fbListen) { cb(); return; }
  if (tries > 40) { connErr(); return; }
  setTimeout(() => waitFB(cb, tries+1), 150);
}

function connErr() {
  document.getElementById("conn-badge").className = "conn-badge conn-err";
  document.getElementById("conn-badge").textContent = " Sin conexión";
  document.getElementById("loading").style.display = "none";
  toast("Error al conectar con Firebase","tr");
}

// ── INIT ──
window.addEventListener("load", () => {
  const img = document.getElementById("map-img");
  const go = () => { if (img.offsetWidth) buildZones(); };
  img.onload = go;
  if (img.complete) setTimeout(go, 50);
  window.addEventListener("resize", buildZones);

  waitFB(() => {
    // Listen for real-time changes
    window._fbListen("reservations", (data) => {
      RV = data || {};
      buildZones();
      updateStats();
      rlist();
      // Update open panel if any
      if (SEL) pick(SEL, true);
      // Hide loading on first data
      document.getElementById("loading").style.display = "none";
      document.getElementById("conn-badge").className = "conn-badge conn-ok";
      document.getElementById("conn-badge").textContent = "En vivo";
      fbReady = true;
    });
  });
});

// ── BUILD ZONES ──
function buildZones() {
  const mb = document.getElementById("mb");
  mb.querySelectorAll(".sz").forEach(e => e.remove());
  const img = document.getElementById("map-img");
  const W = img.offsetWidth, H = img.offsetHeight;
  if (!W || !H) return;

  for (const [id, p] of Object.entries(SD)) {
    const label = id === "B-13b" ? "B-13" : id;
    const d = document.createElement("div");
    d.className = "sz " + (RV[id] ? "occ" : "free") + (SEL === id ? " sel" : "");
    d.style.cssText = `left:${p.x/100*W}px;top:${p.y/100*H}px;width:${p.w/100*W}px;height:${p.h/100*H}px;transform:rotate(${p.r||0}deg);transform-origin:center center;`;
    d.title = label + (RV[id] ? ` — ${RV[id].e}` : " — Disponible");
    d.onclick = () => pick(id);
    mb.appendChild(d);
  }
}

// ── PICK STAND ──
function pick(id, silent=false) {
  SEL = id;
  if (!silent) buildZones();
  const label = id === "B-13b" ? "B-13" : id;
  document.getElementById("msg").style.display = "none";
  document.getElementById("panel").style.display = "flex";
  document.getElementById("psec").textContent = SNAME[SD[id].s] || "";

  if (RV[id]) {
    const r = RV[id];
    document.getElementById("pbadge").innerHTML = `<div class="sbadge sr">Stand ${label} — Ocupado</div>`;
    document.getElementById("pf-free").style.display = "none";
    document.getElementById("pf-occ").style.display = "flex";
    document.getElementById("poccinfo").innerHTML =
      `<strong>${r.e}</strong><br>
       <span class="lbl">Contacto:</span> ${r.c}<br>
       ${r.t ? `<span class="lbl">Tel:</span> ${r.t}<br>` : ""}
       ${r.n ? `<span class="lbl">Notas:</span> ${r.n}<br>` : ""}
       <div style="margin-top:7px;font-size:0.69rem;color:var(--mut)">Reservado: ${r.f}</div>`;
  } else {
    document.getElementById("pbadge").innerHTML = `<div class="sbadge sg">Stand ${label} — Disponible</div>`;
    document.getElementById("pf-occ").style.display = "none";
    document.getElementById("pf-free").style.display = "flex";
    if (!silent) ["fe","fc","ft","fn"].forEach(x => document.getElementById(x).value = "");
  }
  stab("book");
}

// ── BOOK ──
async function doBook() {
  if (!fbReady) { toast("Esperando conexión...","tr"); return; }
  const e = document.getElementById("fe").value.trim();
  const c = document.getElementById("fc").value.trim();
  if (!e) { toast("⚠️ Ingresa empresa o expositor","tr"); return; }
  if (!c) { toast("⚠️ Ingresa el contacto","tr"); return; }
  const now = new Date();
  const data = {
    e, c,
    t: document.getElementById("ft").value.trim(),
    n: document.getElementById("fn").value.trim(),
    f: now.toLocaleDateString("es-MX", {day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit"})
  };
  try {
    await window._fbSet(`reservations/${SEL}`, data);
    toast(`Stand ${SEL==="B-13b"?"B-13":SEL} reservado — ${e}`, "tg");
  } catch(err) {
    toast("Error al guardar reserva","tr");
  }
}

// ── CANCEL ──
async function doCancel() {
  if (!fbReady) { toast("Esperando conexión...","tr"); return; }
  const id = SEL;
  try {
    await window._fbRemove(`reservations/${id}`);
    toast(`Stand ${id==="B-13b"?"B-13":id} liberado`, "tg");
  } catch(err) {
    toast("Error al cancelar reserva","tr");
  }
}

// ── STATS ──
function updateStats() {
  const tot = Object.keys(SD).length;
  const occ = Object.keys(RV).length;
  document.getElementById("nf").textContent = tot - occ;
  document.getElementById("no").textContent = occ;
  document.getElementById("nc").textContent = occ;
}

// ── LIST ──
function rlist() {
  const q = (document.getElementById("sq").value || "").toLowerCase();
  const entries = Object.entries(RV).filter(([id, r]) => {
    if (!q) return true;
    const l = (id==="B-13b"?"B-13":id).toLowerCase();
    return l.includes(q) || r.e.toLowerCase().includes(q) || r.c.toLowerCase().includes(q);
  });
  const el = document.getElementById("rlist-wrap");
  if (!entries.length) {
    el.innerHTML = `<div class="empty"><div class="ei">—</div><p>${q?"Sin resultados":"Sin reservas aún"}</p></div>`;
    return;
  }
  el.innerHTML = entries.map(([id, r]) => {
    const l = id==="B-13b"?"B-13":id;
    return `<div class="ri" onclick="pick('${id}')">
      <div class="ri-id">${l}</div>
      <div class="ri-info">
        <div class="ri-co">${r.e}</div>
        <div class="ri-ct">${r.c}${r.t?" · "+r.t:""}</div>
        <div class="ri-dt">${r.f}</div>
      </div>
      <button class="ri-del" onclick="event.stopPropagation();delr('${id}')" title="Liberar"></button>
    </div>`;
  }).join("");
}

async function delr(id) {
  try {
    await window._fbRemove(`reservations/${id}`);
    toast(`Stand ${id==="B-13b"?"B-13":id} liberado`,"tg");
  } catch { toast("Error","tr"); }
}

function stab(t) {
  ["book","list"].forEach(n => {
    document.getElementById(`p-${n}`).classList.toggle("on", n===t);
  });
  document.querySelectorAll(".tab").forEach((el,i) =>
    el.classList.toggle("on", (i===0&&t==="book")||(i===1&&t==="list"))
  );
}

function toast(msg, cls="tg") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = `toast ${cls} on`;
  setTimeout(() => el.classList.remove("on"), 3500);
}
